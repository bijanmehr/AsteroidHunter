<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
<title>AsteroidHunter</title>
<style>
  :root { --phos: #ffffff; }
  * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    margin: 0; width: 100%; height: 100%; background: #000; color: var(--phos);
    font-family: "Courier New", monospace; overflow: hidden;
    -webkit-user-select: none; user-select: none; touch-action: none;
    overscroll-behavior: none;
  }
  /* canvas fills the whole viewport — no box, no letterbox */
  #screen { position: fixed; inset: 0; width: 100vw; height: 100vh; display: block; background: #000; }

  #status {
    position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
    letter-spacing: 2px; text-transform: uppercase; font-size: 14px; opacity: .85;
    text-shadow: 0 0 8px var(--phos); pointer-events: none; z-index: 5;
  }
  #hint {
    position: fixed; left: 0; right: 0; bottom: 10px; text-align: center;
    font-size: 12px; letter-spacing: 1px; opacity: .45; text-transform: uppercase;
    pointer-events: none; z-index: 5;
  }
  #hint b { color: var(--phos); opacity: .9; }

  /* on-screen controls — shown on touch devices */
  #pad { display: none; position: fixed; inset: auto 0 0 0; bottom: max(14px, env(safe-area-inset-bottom));
         justify-content: space-between; padding: 0 18px; z-index: 6; }
  #pad .group { display: flex; gap: 14px; align-items: flex-end; }
  #pad button {
    width: 72px; height: 72px; border-radius: 50%; background: rgba(255,255,255,.07);
    border: 1px solid #555; color: var(--phos); font-size: 26px; font-family: inherit;
    -webkit-user-select: none; user-select: none;
  }
  #pad button:active { background: rgba(255,255,255,.2); }
  #restart {
    position: fixed; top: max(10px, env(safe-area-inset-top)); right: 14px; z-index: 6;
    display: none; background: rgba(255,255,255,.07); border: 1px solid #555;
    color: var(--phos); font-family: inherit; font-size: 13px; letter-spacing: 1px;
    padding: 8px 12px; border-radius: 6px; text-transform: uppercase;
  }
  @media (pointer: coarse) { #pad { display: flex; } #restart { display: block; } #hint { display: none; } }
</style>
</head>
<body>
  <canvas id="screen"></canvas>
  <div id="status">booting…</div>
  <div id="hint">
    <b>&larr; &rarr;</b> rotate &nbsp; <b>&uarr;</b> thrust &nbsp; <b>SPACE</b> fire &nbsp; <b>SHIFT</b> hyperspace &nbsp; <b>R</b> restart
  </div>

  <button id="restart" data-action="restart">&#8635; new game</button>
  <div id="pad">
    <div class="group">
      <button data-bit="LEFT" aria-label="rotate left">&#8634;</button>
      <button data-bit="RIGHT" aria-label="rotate right">&#8635;</button>
    </div>
    <div class="group">
      <button data-bit="HYPER" aria-label="hyperspace">&#10022;</button>
      <button data-bit="FIRE" aria-label="fire">&#9679;</button>
      <button data-bit="THRUST" aria-label="thrust">&#9650;</button>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/pyodide/v0.26.4/full/pyodide.js"></script>
  <script src="vectorfont.js"></script>
  <script src="renderer.js"></script>
  <script src="app.js"></script>
</body>
</html>
